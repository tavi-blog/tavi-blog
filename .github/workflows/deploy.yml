name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: 1

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  newsletter:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send newsletter for new posts
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, glob, sys, urllib.request, urllib.error, yaml
          from datetime import datetime

          SENT_FILE = "newsletter-sent.json"
          POSTS_DIR = "src/content/blog"
          API_URL = "https://api.buttondown.com/v1/emails"
          BASE_URL = "https://tavi-blog.github.io"
          API_KEY = os.environ["BUTTONDOWN_API_KEY"]

          sent = {}
          if os.path.exists(SENT_FILE):
              with open(SENT_FILE) as f:
                  sent = json.load(f)

          posts = sorted(glob.glob(f"{POSTS_DIR}/*.md"))
          failed = False

          for post_path in posts:
              slug = os.path.basename(post_path)[:-3]
              if slug == ".gitkeep" or slug in sent:
                  continue

              with open(post_path) as f:
                  raw = f.read()

              fm_match = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
              if not fm_match:
                  print(f"Warning: skipping {slug} — no frontmatter found")
                  continue

              fm_data = yaml.safe_load(fm_match.group(1))
              body = raw[fm_match.end():].strip()

              full_title = fm_data.get('title', '')
              if not full_title:
                  print(f"Warning: skipping {slug} — no title in frontmatter")
                  continue

              subject = re.sub(r'^[^a-zA-Z0-9]+', '', full_title).strip()
              pub_date = fm_data.get('pubDate', '')
              raw_date = str(pub_date)[:10] if pub_date else ""

              try:
                  formatted_date = datetime.strptime(raw_date, "%Y-%m-%d").strftime("%B %-d, %Y")
              except ValueError:
                  formatted_date = raw_date

              canonical = f"{BASE_URL}/{slug}/"
              email_body = f"{full_title}\n{formatted_date} · {canonical}\n\n{body}"

              payload = json.dumps({
                  "subject": subject,
                  "body": email_body,
                  "status": "about_to_send",
              }).encode()

              req = urllib.request.Request(
                  API_URL,
                  data=payload,
                  headers={
                      "Authorization": f"Token {API_KEY}",
                      "Content-Type": "application/json",
                      "X-Buttondown-Live-Dangerously": "true",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read())
                      email_id = result["id"]
                  sent[slug] = {
                      "buttondown_id": email_id,
                      "subject": subject,
                      "sent_at": raw_date,
                  }
                  # Write after each successful send so a mid-run failure
                  # doesn't lose already-sent entries and cause duplicate sends.
                  with open(SENT_FILE, "w") as f:
                      json.dump(sent, f, indent=2)
                  print(f"Sent: {subject} ({email_id})")
              except urllib.error.HTTPError as e:
                  err = e.read().decode()
                  try:
                      err_code = json.loads(err).get("code", "")
                  except json.JSONDecodeError:
                      err_code = ""
                  if err_code == "email_duplicate":
                      # Already sent outside the workflow; log it and move on.
                      print(f"Note: '{slug}' already exists in Buttondown. Marking as sent.")
                      sent[slug] = {"buttondown_id": None, "subject": subject, "sent_at": raw_date, "note": "duplicate_detected"}
                      with open(SENT_FILE, "w") as f:
                          json.dump(sent, f, indent=2)
                  else:
                      print(f"ERROR: Buttondown returned {e.code} for '{slug}': {err}", file=sys.stderr)
                      failed = True

          if failed:
              # Exit non-zero to surface the error in the Actions UI.
              # The deploy job already completed — this does not roll it back.
              sys.exit(1)
          PYEOF

      - name: Commit updated sent log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet newsletter-sent.json; then
            echo "No new emails sent."
            exit 0
          fi
          git stash
          git pull --rebase origin main
          git stash pop
          git add newsletter-sent.json
          git commit -m "chore: update newsletter sent log [skip ci]"
          git push origin main

  social:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install anthropic
        run: pip install anthropic --quiet

      - name: Generate social snippet for new posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, glob, re, sys, yaml, subprocess

          SOCIAL_FILE = "social-sent.json"
          POSTS_DIR = "src/content/blog"
          BASE_URL = "https://tavi-blog.github.io"

          social = {}
          if os.path.exists(SOCIAL_FILE):
              with open(SOCIAL_FILE) as f:
                  social = json.load(f)

          posts = sorted(glob.glob(f"{POSTS_DIR}/*.md"))
          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          repo = os.environ.get("REPO", "")

          for post_path in posts:
              slug = os.path.basename(post_path)[:-3]
              if slug == ".gitkeep" or slug in social:
                  continue

              with open(post_path) as f:
                  raw = f.read()

              fm_match = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
              if not fm_match:
                  continue

              fm_data = yaml.safe_load(fm_match.group(1))
              title = fm_data.get('title', '')
              if not title:
                  continue

              body = raw[fm_match.end():].strip()
              canonical = f"{BASE_URL}/{slug}/"

              snippet = None
              if api_key and body:
                  try:
                      import anthropic as ac_mod
                      ac = ac_mod.Anthropic(api_key=api_key)
                      msg = ac.messages.create(
                          model="claude-haiku-4-5-20251001",
                          max_tokens=200,
                          messages=[{
                              "role": "user",
                              "content": (
                                  "Write a social media post to share this blog post on Twitter, Threads, and Substack Notes. "
                                  "3-4 short sentences. First-person, conversational, same voice as the post itself. "
                                  "Open with a hook from the post. No hashtags. No emoji. "
                                  f"End with the link on its own line: {canonical}\n\n"
                                  f"{body[:3000]}"
                              ),
                          }],
                      )
                      snippet = msg.content[0].text.strip()
                  except Exception as e:
                      print(f"Warning: Claude generation failed for '{slug}': {e}", file=sys.stderr)

              if not snippet:
                  desc = fm_data.get('description', '').strip()
                  snippet = f"{desc}\n\n{canonical}" if desc else canonical

              issue_title = f"Social: {title}"
              issue_body = f"**Ready to share on Twitter / Threads / Substack Notes**\n\n---\n\n{snippet}\n\n---"

              result = subprocess.run(
                  ["gh", "issue", "create", "--repo", repo,
                   "--title", issue_title, "--body", issue_body],
                  capture_output=True, text=True
              )

              if result.returncode == 0:
                  issue_url = result.stdout.strip()
                  social[slug] = {"issue_url": issue_url, "title": title}
                  with open(SOCIAL_FILE, "w") as f:
                      json.dump(social, f, indent=2)
                  print(f"Created issue: {issue_url}")
              else:
                  print(f"ERROR creating issue for '{slug}': {result.stderr}", file=sys.stderr)
                  sys.exit(1)

          PYEOF

      - name: Commit social sent log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f social-sent.json ] || git diff --quiet social-sent.json; then
            echo "No new social posts."
            exit 0
          fi
          git stash
          git pull --rebase origin main
          git stash pop
          git add social-sent.json
          git commit -m "chore: update social sent log [skip ci]"
          git push origin main
